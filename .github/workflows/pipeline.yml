name: AQI Pipeline Automation

on:
  schedule:
    # Run feature script every hour
    - cron: "0 * * * *"
    # Run training script every day at midnight
    - cron: "0 0 * * *"
  workflow_dispatch: # allow manual trigger too

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run feature generation script (hourly)
        if: github.event.schedule == '0 * * * *'
        run: python scripts/preprocess_data.py

      - name: Run training script (daily)
        if: github.event.schedule == '0 0 * * *'
        run: python scripts/train_models.py
